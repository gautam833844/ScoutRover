version: '3.8'

services:
  mongo:
    image: mongo:6.0
    container_name: scoutrover-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - scoutrover-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scoutrover-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017/scoutrover}
      - JWT_SECRET=${JWT_SECRET:-scout_rover_super_secret_jwt_key_2026}
      - JWT_EXPIRES_IN=1d
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET:-scout_rover_super_secret_refresh_token_key_2026}
      - REFRESH_TOKEN_EXPIRES_IN=7d
      - SMTP_HOST=smtp.mailtrap.io
      - SMTP_PORT=2525
      - SMTP_USER=${SMTP_USER:-mock_user}
      - SMTP_PASS=${SMTP_PASS:-mock_pass}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - scoutrover-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scoutrover-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api/v1
    depends_on:
      - backend
    networks:
      - scoutrover-network

volumes:
  mongo_data:

networks:
  scoutrover-network:
    driver: bridge
