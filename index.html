<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>RoverOS - Autonomous Mapping System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <span class="robot-icon">🤖</span>
        <h1 class="header-title">RoverOS</h1>
      </div>
      <div class="connection-dot" id="header-dot"></div>
    </header>

    <!-- Connection Screen (STATE 1 & 2) -->
    <div class="connection-screen" id="connection-screen">
      <div class="connection-icon" id="connection-icon">📡</div>
      <h2 class="connection-title" id="connection-title">
        Connect to RoverOS WiFi
      </h2>
      <p class="connection-subtitle" id="connection-subtitle">
        Please connect your phone or laptop to the WiFi network named
        <strong>RoverOS</strong> then this page will connect automatically
      </p>
      <div class="spinner"></div>
      <button id="test-mode-btn" onclick="skipToTestDashboard()">
        Test Dashboard
      </button>
    </div>

    <!-- Main Dashboard (STATE 3) -->
    <div class="container hidden" id="dashboard">
      <!-- Status Card -->
      <div class="status-card">
        <div class="status-dot" id="status-dot"></div>
        <div class="status-text">
          Status: <span id="status-text">Connected</span>
        </div>
      </div>

      <!-- Map Panel -->
      <div class="map-panel">
        <label class="panel-label">Live Map</label>
        <div id="map-container">
          <span id="map-placeholder">Awaiting map data...</span>
          <canvas id="map-canvas"></canvas>
        </div>
        <div
          id="map-timestamp"
          style="
            font-size: 12px;
            color: #9ca3af;
            margin-top: 8px;
            text-align: center;
          "
        >
          Last updated: Never
        </div>
        <div class="map-actions">
          <button class="map-btn save" onclick="saveMap()">💾 Save Map</button>
          <button class="map-btn download" onclick="downloadMap()">⬇ Download Map</button>
        </div>
        <div id="save-status" style="margin-top: 12px; padding: 10px 12px; text-align: center; border-radius: 6px; display: none; font-size: 13px; font-weight: 500;"></div>
      </div>

      <!-- Controls Card -->
      <div class="controls-card">
        <label class="panel-label">Movement Controls</label>
        <div class="controls">
          <div class="row">
            <button onmousedown="startCmd('forward')" onmouseup="stopRover()" ontouchstart="startCmd('forward')" ontouchend="stopRover()">⬆</button>
          </div>
          <div class="row">
            <button onmousedown="startCmd('left')" onmouseup="stopRover()" ontouchstart="startCmd('left')" ontouchend="stopRover()">⬅</button>
            <button id="stop-btn" onmousedown="stopRover()" ontouchstart="stopRover()">⏹</button>
            <button onmousedown="startCmd('right')" onmouseup="stopRover()" ontouchstart="startCmd('right')" ontouchend="stopRover()">➡</button>
          </div>
          <div class="row">
            <button onmousedown="startCmd('backward')" onmouseup="stopRover()" ontouchstart="startCmd('backward')" ontouchend="stopRover()">⬇</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">RoverOS v1.0 — Autonomous Mapping System</footer>

    <!-- ROSLib library - must load first -->
    <script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
    <!-- Application logic - loads after ROSLib -->
    <script src="js/app.js"></script>
  </body>
</html>
