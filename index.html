<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>RoverOS - Autonomous Mapping System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <!-- Hexagon background -->
          <path d="M50 5 L85 27 L85 72 L50 95 L15 72 L15 27 Z" fill="none" stroke="#2c3e50" stroke-width="3" stroke-linejoin="round"/>
          <!-- Grid pattern -->
          <line x1="30" y1="30" x2="70" y2="30" stroke="#2c3e50" stroke-width="1.5" opacity="0.3"/>
          <line x1="25" y1="50" x2="75" y2="50" stroke="#2c3e50" stroke-width="1.5" opacity="0.3"/>
          <line x1="30" y1="70" x2="70" y2="70" stroke="#2c3e50" stroke-width="1.5" opacity="0.3"/>
          <!-- A letter -->
          <text x="50" y="60" font-size="40" font-weight="700" text-anchor="middle" fill="#2c3e50" font-family="Arial">A</text>
          <!-- WiFi symbol -->
          <g transform="translate(65, 25)">
            <circle cx="0" cy="0" r="3" fill="#ff9500"/>
            <path d="M -8 2 Q -8 8 0 10 Q 8 8 8 2" stroke="#ff9500" stroke-width="2" fill="none"/>
            <path d="M -12 -2 Q -15 5 0 18 Q 15 5 12 -2" stroke="#ff9500" stroke-width="2" fill="none" opacity="0.6"/>
          </g>
        </svg>
        <h1 class="header-title">ATLAS</h1>
      </div>
      <div class="connection-dot" id="header-dot"></div>
    </header>

    <!-- Connection Screen (STATE 1 & 2) -->
    <div class="connection-screen" id="connection-screen">
      <div class="connection-icon" id="connection-icon">📡</div>
      <h2 class="connection-title" id="connection-title">
        Connect to RoverOS WiFi
      </h2>
      <p class="connection-subtitle" id="connection-subtitle">
        Please connect your phone or laptop to the WiFi network named
        <strong>RoverOS</strong> then this page will connect automatically
      </p>
      <div class="spinner"></div>
      <button id="test-mode-btn" onclick="skipToTestDashboard()">
        Test Dashboard
      </button>
    </div>

    <!-- Main Dashboard (STATE 3) -->
    <div class="container hidden" id="dashboard">
      <!-- Status Card -->
      <div class="status-card">
        <div class="status-dot" id="status-dot"></div>
        <div class="status-text">
          Status: <span id="status-text">Connected</span>
        </div>
      </div>

      <!-- Map Panel -->
      <div class="map-panel">
        <label class="panel-label">Live Map</label>
        <div id="map-container">
          <span id="map-placeholder">Awaiting map data...</span>
          <canvas id="map-canvas"></canvas>
        </div>
        <div
          id="map-timestamp"
          style="
            font-size: 12px;
            color: #9ca3af;
            margin-top: 8px;
            text-align: center;
          "
        >
          Last updated: Never
        </div>
        <div class="map-actions">
          <button class="map-btn save" onclick="saveMap()">💾 Save Map</button>
          <button class="map-btn download" onclick="downloadMap()">
            ⬇ Download Map
          </button>
        </div>
        <div
          id="save-status"
          style="
            margin-top: 12px;
            padding: 10px 12px;
            text-align: center;
            border-radius: 6px;
            display: none;
            font-size: 13px;
            font-weight: 500;
          "
        ></div>
      </div>

      <!-- Controls Card -->
      <div class="controls-card">
        <label class="panel-label">Movement Controls</label>
        <div class="controls">
          <div class="row">
            <button
              onmousedown="startCmd('forward')"
              onmouseup="stopRover()"
              ontouchstart="startCmd('forward')"
              ontouchend="stopRover()"
            >
              ⬆
            </button>
          </div>
          <div class="row">
            <button
              onmousedown="startCmd('left')"
              onmouseup="stopRover()"
              ontouchstart="startCmd('left')"
              ontouchend="stopRover()"
            >
              ⬅
            </button>
            <button
              id="stop-btn"
              onmousedown="stopRover()"
              ontouchstart="stopRover()"
            >
              ⏹
            </button>
            <button
              onmousedown="startCmd('right')"
              onmouseup="stopRover()"
              ontouchstart="startCmd('right')"
              ontouchend="stopRover()"
            >
              ➡
            </button>
          </div>
          <div class="row">
            <button
              onmousedown="startCmd('backward')"
              onmouseup="stopRover()"
              ontouchstart="startCmd('backward')"
              ontouchend="stopRover()"
            >
              ⬇
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">RoverOS v1.0 — Autonomous Mapping System</footer>

    <!-- ROSLib library - must load first -->
    <script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
    <!-- Application logic - loads after ROSLib -->
    <script src="js/app.js"></script>
  </body>
</html>
