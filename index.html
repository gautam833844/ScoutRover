<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>RoverOS - Autonomous Mapping System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <svg
          class="logo-svg"
          viewBox="0 0 120 120"
          xmlns="http://www.w3.org/2000/svg"
        >
          <!-- Outer Hexagon -->
          <path
            d="M60 10 L105 35 L105 85 L60 110 L15 85 L15 35 Z"
            fill="none"
            stroke="#2c3e50"
            stroke-width="4"
            stroke-linejoin="round"
          />

          <!-- Grid pattern inside hexagon -->
          <path
            d="M40 45 L80 45"
            stroke="#2c3e50"
            stroke-width="2"
            opacity="0.4"
          />
          <path
            d="M30 60 L90 60"
            stroke="#2c3e50"
            stroke-width="2"
            opacity="0.4"
          />
          <path
            d="M40 75 L80 75"
            stroke="#2c3e50"
            stroke-width="2"
            opacity="0.4"
          />

          <!-- Hexagon grid sections -->
          <path
            d="M60 35 L75 45 L75 65 L60 75 L45 65 L45 45 Z"
            fill="none"
            stroke="#2c3e50"
            stroke-width="1.5"
            opacity="0.3"
          />
          <path
            d="M85 50 L95 57 L95 75 L85 82 L75 75 L75 57 Z"
            fill="none"
            stroke="#2c3e50"
            stroke-width="1.5"
            opacity="0.3"
          />
          <path
            d="M25 50 L35 57 L35 75 L25 82 L15 75 L15 57 Z"
            fill="none"
            stroke="#2c3e50"
            stroke-width="1.5"
            opacity="0.3"
          />

          <!-- Central A Letter -->
          <text
            x="60"
            y="72"
            font-size="56"
            font-weight="900"
            text-anchor="middle"
            fill="#2c3e50"
            font-family="Arial, sans-serif"
          >
            A
          </text>

          <!-- WiFi Signal (orange) -->
          <g transform="translate(25, 30)">
            <!-- WiFi dot -->
            <circle cx="0" cy="0" r="3.5" fill="#ff9500" />
            <!-- First wave -->
            <path
              d="M -10 3 Q -10 10 0 12 Q 10 10 10 3"
              stroke="#ff9500"
              stroke-width="2.5"
              fill="none"
              stroke-linecap="round"
            />
            <!-- Second wave -->
            <path
              d="M -16 -2 Q -20 8 0 18 Q 20 8 16 -2"
              stroke="#ff9500"
              stroke-width="2.5"
              fill="none"
              stroke-linecap="round"
              opacity="0.7"
            />
          </g>

          <!-- Connection nodes (orange) -->
          <circle cx="40" cy="50" r="4" fill="#ff9500" />
          <circle cx="80" cy="50" r="4" fill="#ff9500" />
          <circle cx="50" cy="85" r="4" fill="#ff9500" />
          <circle cx="70" cy="85" r="4" fill="#ff9500" />
        </svg>
        <h1 class="header-title">ATLAS</h1>
      </div>
      <div class="connection-dot" id="header-dot"></div>
    </header>

    <!-- Connection Screen (STATE 1 & 2) -->
    <div class="connection-screen" id="connection-screen">
      <div class="connection-icon" id="connection-icon">📡</div>
      <h2 class="connection-title" id="connection-title">
        Connect to RoverOS WiFi
      </h2>
      <p class="connection-subtitle" id="connection-subtitle">
        Please connect your phone or laptop to the WiFi network named
        <strong>RoverOS</strong> then this page will connect automatically
      </p>
      <div class="spinner"></div>
      <button id="test-mode-btn" onclick="skipToTestDashboard()">
        Test Dashboard
      </button>
    </div>

    <!-- Main Dashboard (STATE 3) -->
    <div class="container hidden" id="dashboard">
      <!-- Status Card -->
      <div class="status-card">
        <div class="status-dot" id="status-dot"></div>
        <div class="status-text">
          Status: <span id="status-text">Connected</span>
        </div>
      </div>

      <!-- Map Panel -->
      <div class="map-panel">
        <label class="panel-label">Live Map</label>
        <div id="map-container">
          <span id="map-placeholder">Awaiting map data...</span>
          <canvas id="map-canvas"></canvas>
        </div>
        <div
          id="map-timestamp"
          style="
            font-size: 12px;
            color: #9ca3af;
            margin-top: 8px;
            text-align: center;
          "
        >
          Last updated: Never
        </div>
        <div class="map-actions">
          <button class="map-btn save" onclick="saveMap()">💾 Save Map</button>
          <button class="map-btn download" onclick="downloadMap()">
            ⬇ Download Map
          </button>
        </div>
        <div
          id="save-status"
          style="
            margin-top: 12px;
            padding: 10px 12px;
            text-align: center;
            border-radius: 6px;
            display: none;
            font-size: 13px;
            font-weight: 500;
          "
        ></div>
      </div>

      <!-- Controls Card -->
      <div class="controls-card">
        <label class="panel-label">Movement Controls</label>
        <div class="controls">
          <div class="row">
            <button
              onmousedown="startCmd('forward')"
              onmouseup="stopRover()"
              ontouchstart="startCmd('forward')"
              ontouchend="stopRover()"
            >
              ⬆
            </button>
          </div>
          <div class="row">
            <button
              onmousedown="startCmd('left')"
              onmouseup="stopRover()"
              ontouchstart="startCmd('left')"
              ontouchend="stopRover()"
            >
              ⬅
            </button>
            <button
              id="stop-btn"
              onmousedown="stopRover()"
              ontouchstart="stopRover()"
            >
              ⏹
            </button>
            <button
              onmousedown="startCmd('right')"
              onmouseup="stopRover()"
              ontouchstart="startCmd('right')"
              ontouchend="stopRover()"
            >
              ➡
            </button>
          </div>
          <div class="row">
            <button
              onmousedown="startCmd('backward')"
              onmouseup="stopRover()"
              ontouchstart="startCmd('backward')"
              ontouchend="stopRover()"
            >
              ⬇
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">RoverOS v1.0 — Autonomous Mapping System</footer>

    <!-- ROSLib library - must load first -->
    <script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
    <!-- Application logic - loads after ROSLib -->
    <script src="js/app.js"></script>
  </body>
</html>
